services:
  campfire:
    build: .
    ports:
      - "4567:4567"
    volumes:
      # All persistent data (sessions, settings, agents, recordings, envs, webhooks)
      - campfire-data:/home/campfire/.campfire
    environment:
      - NODE_ENV=production
      - PORT=4567
    restart: unless-stopped

volumes:
  campfire-data:
